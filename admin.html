<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Ed Nicholls Acupuncture</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Marisa';
      src: url('/Marisa-Light.otf') format('opentype');
      font-weight: 300; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Marisa';
      src: url('/Marisa-Regular.otf') format('opentype');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Marisa';
      src: url('/Marisa-Medium.otf') format('opentype');
      font-weight: 500; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Marisa';
      src: url('/Marisa-Bold.otf') format('opentype');
      font-weight: 700; font-style: normal; font-display: swap;
    }
    :root {
      --bg: #FAF8F4; --surface: #FFFFFF; --text: #2A2722; --text-muted: #6B6660;
      --primary: #5C7A6E; --primary-dark: #455D54; --accent: #C8956D; --border: #E8E3DA;
      --danger: #B85450;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Raleway', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
    .display { font-family: 'Marisa', Georgia, serif; font-weight: 500; letter-spacing: -0.02em; }
    .view { animation: fadeIn 0.25s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .btn-primary { background: var(--primary); color: white; transition: all 0.15s ease; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); transition: all 0.15s ease; }
    .btn-secondary:hover { border-color: var(--primary); }
    .btn-danger { background: var(--surface); color: var(--danger); border: 1px solid var(--border); transition: all 0.15s ease; }
    .btn-danger:hover { border-color: var(--danger); background: rgba(184,84,80,0.04); }
    .card { background: var(--surface); border: 1px solid var(--border); transition: all 0.15s ease; }
    .card-hover:hover { border-color: var(--primary); }
    .input { background: var(--surface); border: 1px solid var(--border); transition: all 0.15s ease; font-family: inherit; font-size: 1rem; }
    .input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(92,122,110,0.1); }
    .tab { padding: 8px 16px; border-radius: 8px; transition: all 0.15s ease; cursor: pointer; }
    .tab:hover { background: rgba(92,122,110,0.08); }
    .tab.active { background: var(--primary); color: white; }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge-confirmed { background: rgba(92,122,110,0.12); color: var(--primary); }
    .badge-completed { background: rgba(107,102,96,0.12); color: var(--text-muted); }
    .badge-cancelled { background: rgba(184,84,80,0.12); color: var(--danger); }
    .badge-package { background: rgba(200,149,109,0.12); color: var(--accent); }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .skeleton { background: linear-gradient(90deg, #f0ece5 25%, #f8f5ee 50%, #f0ece5 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    .modal-backdrop { background: rgba(42,39,34,0.4); backdrop-filter: blur(4px); }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center px-6">
      <div class="max-w-sm w-full">
        <div class="text-center mb-8">
          <div class="display text-2xl mb-1">Ed Nicholls Acupuncture</div>
          <div class="text-sm text-[var(--text-muted)]">Admin Dashboard</div>
        </div>
        <div id="auth-content" class="card rounded-xl p-6"></div>
      </div>
    </div>

    <div id="main" class="hidden">
      <header class="border-b border-[var(--border)] bg-white sticky top-0 z-20">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
          <div>
            <div class="display text-lg">Ed Nicholls Acupuncture</div>
            <div class="text-xs text-[var(--text-muted)]">Admin · <a href="#" id="signout" class="underline hover:text-[var(--text)]">Sign out</a></div>
          </div>
          <nav class="flex items-center gap-1 text-sm font-medium">
            <button data-tab="today" class="tab active">Today</button>
            <button data-tab="upcoming" class="tab">Upcoming</button>
            <button data-tab="customers" class="tab">Customers</button>
            <button data-tab="availability" class="tab">Availability</button>
            <button id="new-booking-btn" class="btn-primary ml-2 px-3 py-2 rounded-lg text-sm">+ New booking</button>
          </nav>
        </div>
      </header>
      <main class="max-w-6xl mx-auto px-6 py-8">
        <div id="view"></div>
      </main>
    </div>
  </div>

  <div id="modal" class="hidden fixed inset-0 z-30 modal-backdrop flex items-center justify-center px-4">
    <div id="modal-content" class="bg-white rounded-xl max-w-lg w-full max-h-[85vh] overflow-y-auto"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'https://bdzasnbzyfkqojqqucil.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_XOH_-PTfkNsPhwY5eMV_Tg_M9GPbWE5'
    const ADMIN_EMAIL = 'acu@ednicholls.com'
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { detectSessionInUrl: true, flowType: 'implicit', persistSession: true }
    })

    const authScreen = document.getElementById('auth-screen')
    const authContent = document.getElementById('auth-content')
    const mainEl = document.getElementById('main')
    const viewEl = document.getElementById('view')
    const modalEl = document.getElementById('modal')
    const modalContentEl = document.getElementById('modal-content')

    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
    const fmt = {
      money: p => '£' + (p/100).toFixed(0),
      time: d => d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
      dateShort: d => d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }),
      dateLong: d => d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' })
    }

    let currentTab = 'today'
    const state = {
      bookings: [], customers: [], services: [], packages: [],
      packageContents: {}, customerPackages: [], balances: [], availabilityRules: []
    }

    // ============================================================
    // AUTH FLOW
    // ============================================================

    function showAuthEmailForm(error = null) {
      authContent.innerHTML = `
        <h2 class="display text-xl mb-2">Sign in</h2>
        <p class="text-sm text-[var(--text-muted)] mb-4">Enter your admin email to receive a sign-in link.</p>
        <form id="auth-form" class="space-y-3">
          <input required name="email" type="email" placeholder="${ADMIN_EMAIL}" class="input w-full px-4 py-3 rounded-lg" autofocus value="${ADMIN_EMAIL}">
          <button id="send-btn" type="submit" class="btn-primary w-full py-3 rounded-lg font-semibold">Send sign-in link</button>
          ${error ? `<p class="text-sm text-[var(--danger)]">${error}</p>` : ''}
        </form>
      `
      document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault()
        const btn = document.getElementById('send-btn')
        btn.disabled = true; btn.textContent = 'Sending...'
        const email = e.target.email.value
        try {
          const r = await fetch(`${SUPABASE_URL}/auth/v1/otp`, {
            method: 'POST',
            headers: {
              apikey: SUPABASE_KEY,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              email,
              create_user: true,
              redirect_to: window.location.origin + window.location.pathname
            })
          })
          if (!r.ok) {
            const errData = await r.json().catch(() => ({}))
            throw new Error(errData.msg || errData.error_description || `${r.status}`)
          }
          showCheckEmail(email)
        } catch (err) {
          showAuthEmailForm(err.message)
        }
      })
    }

    function showCheckEmail(email) {
      authContent.innerHTML = `
        <div>
          <div class="text-center mb-5">
            <div class="w-12 h-12 mx-auto mb-3 rounded-full bg-[var(--primary)] flex items-center justify-center">
              <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l9 6 9-6M3 8v10a2 2 0 002 2h14a2 2 0 002-2V8M3 8l2-2h14l2 2"/></svg>
            </div>
            <h2 class="display text-xl mb-1">Enter the code</h2>
            <p class="text-sm text-[var(--text-muted)] mb-1">6-digit code sent to</p>
            <p class="font-semibold">${email}</p>
          </div>
          <form id="otp-form" class="space-y-3">
            <input
              required name="otp" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
              placeholder="123456" autocomplete="one-time-code"
              class="input w-full px-4 py-3 rounded-lg text-center text-2xl tracking-widest"
              autofocus
            >
            <button id="verify-btn" type="submit" class="btn-primary w-full py-3 rounded-lg font-semibold">Sign in</button>
            <div id="otp-error" class="hidden text-sm text-red-600"></div>
          </form>
          <p class="text-xs text-center text-[var(--text-muted)] mt-4"><a href="#" id="reset-link" class="underline">Use a different email</a></p>
        </div>
      `
      document.getElementById('reset-link').addEventListener('click', (e) => {
        e.preventDefault()
        showAuthEmailForm()
      })
      document.getElementById('otp-form').addEventListener('submit', async (e) => {
        e.preventDefault()
        const btn = document.getElementById('verify-btn')
        const err = document.getElementById('otp-error')
        btn.disabled = true; btn.textContent = 'Verifying…'
        err.classList.add('hidden')
        const fd = new FormData(e.target)
        const token = fd.get('otp').toString().trim()
        const { error } = await sb.auth.verifyOtp({ email, token, type: 'email' })
        if (error) {
          err.textContent = error.message
          err.classList.remove('hidden')
          btn.disabled = false; btn.textContent = 'Sign in'
        }
        // Success: onAuthStateChange handles redirecting to dashboard
      })
    }

    function showAccessDenied(email) {
      authContent.innerHTML = `
        <div class="text-center">
          <h2 class="display text-xl mb-2">Access denied</h2>
          <p class="text-sm text-[var(--text-muted)] mb-1">${email}</p>
          <p class="text-sm text-[var(--text-muted)] mb-6">This email is not authorised to access the admin dashboard.</p>
          <button id="signout-btn" class="btn-secondary w-full py-3 rounded-lg font-semibold">Sign out</button>
        </div>
      `
      document.getElementById('signout-btn').addEventListener('click', async () => {
        await sb.auth.signOut()
        showAuthEmailForm()
      })
    }

    sb.auth.onAuthStateChange(async (event, session) => {
      if (session?.user) {
        if (session.user.email === ADMIN_EMAIL) {
          authScreen.classList.add('hidden')
          mainEl.classList.remove('hidden')
          await initMain()
        } else {
          showAccessDenied(session.user.email)
        }
      } else if (event === 'SIGNED_OUT') {
        mainEl.classList.add('hidden')
        authScreen.classList.remove('hidden')
        showAuthEmailForm()
      }
    })

    document.getElementById('signout').addEventListener('click', async (e) => {
      e.preventDefault()
      await sb.auth.signOut()
    })

    // ============================================================
    // MAIN APP
    // ============================================================

    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        currentTab = btn.dataset.tab
        render()
      })
    })

    document.getElementById('new-booking-btn').addEventListener('click', () => {
      openNewBookingModal()
    })

    function openModal(html) {
      modalContentEl.innerHTML = html
      modalEl.classList.remove('hidden')
    }
    function closeModal() { modalEl.classList.add('hidden'); modalContentEl.innerHTML = '' }
    modalEl.addEventListener('click', (e) => { if (e.target === modalEl) closeModal() })

    async function loadAll() {
      const [bookings, customers, services, packages, contents, custPkgs, balances, rules, overrides] = await Promise.all([
        sb.from('bookings').select('*').order('starts_at'),
        sb.from('customers').select('*').order('created_at', { ascending: false }),
        sb.from('services').select('*'),
        sb.from('packages').select('*'),
        sb.from('package_contents').select('*'),
        sb.from('customer_packages').select('*').order('purchased_at', { ascending: false }),
        sb.from('customer_package_balances').select('*'),
        sb.from('availability_rules').select('*').order('day_of_week'),
        sb.from('availability_overrides').select('*').order('date')
      ])
      state.bookings = bookings.data || []
      state.customers = customers.data || []
      state.services = services.data || []
      state.packages = packages.data || []
      state.customerPackages = custPkgs.data || []
      state.balances = balances.data || []
      state.availabilityRules = rules.data || []
      state.availabilityOverrides = overrides.data || []
      state.packageContents = {}
      for (const pc of (contents.data || [])) {
        if (!state.packageContents[pc.package_id]) state.packageContents[pc.package_id] = []
        state.packageContents[pc.package_id].push(pc)
      }
    }

    function svc(id) { return state.services.find(s => s.id === id) }
    function cust(id) { return state.customers.find(c => c.id === id) }
    function pkg(id) { return state.packages.find(p => p.id === id) }
    function custPkg(id) { return state.customerPackages.find(cp => cp.id === id) }
    function isToday(date) {
      const d = new Date(date), t = new Date()
      return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate()
    }

    function render() {
      switch (currentTab) {
        case 'today': return renderToday()
        case 'upcoming': return renderUpcoming()
        case 'customers': return renderCustomers()
        case 'availability': return renderAvailability()
      }
    }

    function renderToday() {
      const today = state.bookings.filter(b => isToday(b.starts_at) && b.status !== 'cancelled')
        .sort((a,b) => new Date(a.starts_at) - new Date(b.starts_at))
      const completedToday = today.filter(b => b.status === 'completed').length
      const upcomingToday = today.filter(b => b.status === 'confirmed' && new Date(b.starts_at) >= new Date()).length
      const next = today.find(b => b.status === 'confirmed' && new Date(b.starts_at) >= new Date())
      const dateStr = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })
      viewEl.innerHTML = `
        <div class="view">
          <h1 class="display text-3xl mb-2">${dateStr}</h1>
          <p class="text-[var(--text-muted)] mb-8">${today.length} session${today.length !== 1 ? 's' : ''} today · ${completedToday} completed · ${upcomingToday} upcoming</p>
          ${next ? `
            <div class="card rounded-xl p-6 mb-8 border-l-4" style="border-left-color: var(--primary)">
              <div class="text-xs font-semibold text-[var(--text-muted)] uppercase tracking-widest mb-2">Up next</div>
              <div class="flex items-center justify-between">
                <div>
                  <div class="display text-2xl mb-1">${fmt.time(new Date(next.starts_at))}</div>
                  <div class="font-semibold">${cust(next.customer_id)?.first_name} ${cust(next.customer_id)?.last_name}</div>
                  <div class="text-sm text-[var(--text-muted)]">${svc(next.service_id)?.name}</div>
                </div>
                <button data-id="${next.id}" class="view-booking btn-secondary px-4 py-2 rounded-lg text-sm">View details</button>
              </div>
            </div>
          ` : ''}
          ${today.length === 0 ? `<div class="text-center py-16 text-[var(--text-muted)]"><div class="text-lg mb-2">No bookings today</div><div class="text-sm">Enjoy the day off.</div></div>` : `
            <div class="space-y-2">
              ${today.map(b => {
                const c = cust(b.customer_id), s = svc(b.service_id)
                const cp = b.customer_package_id ? custPkg(b.customer_package_id) : null
                const pkgName = cp ? pkg(cp.package_id)?.name : null
                return `<div data-id="${b.id}" class="booking-row card card-hover rounded-xl p-4 flex items-center gap-4 cursor-pointer">
                  <div class="text-center min-w-[72px]"><div class="display text-xl">${fmt.time(new Date(b.starts_at))}</div><div class="text-xs text-[var(--text-muted)]">${s?.duration_minutes}min</div></div>
                  <div class="flex-1"><div class="font-semibold">${c?.first_name} ${c?.last_name}</div><div class="text-sm text-[var(--text-muted)]">${s?.name}${pkgName ? ` · ${pkgName}` : ''}</div></div>
                  <span class="badge badge-${b.status}">${b.status}</span>
                </div>`
              }).join('')}
            </div>
          `}
        </div>
      `
      attachBookingHandlers()
    }

    function renderUpcoming() {
      const future = state.bookings.filter(b => new Date(b.starts_at) >= new Date() && b.status !== 'cancelled')
        .sort((a,b) => new Date(a.starts_at) - new Date(b.starts_at))
      const grouped = {}
      for (const b of future) {
        const key = new Date(b.starts_at).toISOString().slice(0,10)
        if (!grouped[key]) grouped[key] = []
        grouped[key].push(b)
      }
      viewEl.innerHTML = `
        <div class="view">
          <h1 class="display text-3xl mb-2">Upcoming</h1>
          <p class="text-[var(--text-muted)] mb-8">${future.length} booking${future.length !== 1 ? 's' : ''} ahead</p>
          ${Object.keys(grouped).length === 0 ? `<div class="text-center py-16 text-[var(--text-muted)]">No upcoming bookings.</div>` : Object.entries(grouped).map(([date, bookings]) => `
            <div class="mb-8">
              <h2 class="text-xs font-semibold text-[var(--text-muted)] uppercase tracking-widest mb-3">${fmt.dateLong(new Date(date))}</h2>
              <div class="space-y-2">
                ${bookings.map(b => {
                  const c = cust(b.customer_id), s = svc(b.service_id)
                  const cp = b.customer_package_id ? custPkg(b.customer_package_id) : null
                  const pkgName = cp ? pkg(cp.package_id)?.name : null
                  return `<div data-id="${b.id}" class="booking-row card card-hover rounded-xl p-4 flex items-center gap-4 cursor-pointer">
                    <div class="text-center min-w-[72px]"><div class="display text-xl">${fmt.time(new Date(b.starts_at))}</div><div class="text-xs text-[var(--text-muted)]">${s?.duration_minutes}min</div></div>
                    <div class="flex-1"><div class="font-semibold">${c?.first_name} ${c?.last_name}</div><div class="text-sm text-[var(--text-muted)]">${s?.name}${pkgName ? ` · ${pkgName}` : ''}</div></div>
                    <span class="badge badge-${b.status}">${b.status}</span>
                  </div>`
                }).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      `
      attachBookingHandlers()
    }

    function renderCustomers() {
      const customersWithStats = state.customers.map(c => {
        const bookings = state.bookings.filter(b => b.customer_id === c.id)
        const packages = state.customerPackages.filter(cp => cp.customer_id === c.id && cp.status === 'active')
        const totalRemaining = packages.reduce((sum, cp) => {
          const balances = state.balances.filter(b => b.customer_package_id === cp.id)
          return sum + balances.reduce((s, b) => s + b.sessions_remaining, 0)
        }, 0)
        return { ...c, bookingCount: bookings.length, packageCount: packages.length, totalRemaining }
      }).sort((a,b) => new Date(b.created_at) - new Date(a.created_at))
      viewEl.innerHTML = `
        <div class="view">
          <h1 class="display text-3xl mb-2">Customers</h1>
          <p class="text-[var(--text-muted)] mb-8">${customersWithStats.length} total</p>
          ${customersWithStats.length === 0 ? `<div class="text-center py-16 text-[var(--text-muted)]">No customers yet.</div>` : `
            <div class="space-y-2">
              ${customersWithStats.map(c => `<div data-id="${c.id}" class="customer-row card card-hover rounded-xl p-4 cursor-pointer">
                <div class="flex items-center justify-between gap-4">
                  <div class="flex-1"><div class="font-semibold">${c.first_name} ${c.last_name}</div><div class="text-sm text-[var(--text-muted)]">${c.email} · ${c.phone || 'no phone'}</div></div>
                  <div class="text-right text-sm">
                    <div class="text-[var(--text-muted)]">${c.bookingCount} booking${c.bookingCount !== 1 ? 's' : ''}</div>
                    ${c.totalRemaining > 0 ? `<div class="text-[var(--accent)] font-semibold">${c.totalRemaining} session${c.totalRemaining !== 1 ? 's' : ''} in package</div>` : ''}
                  </div>
                </div>
              </div>`).join('')}
            </div>
          `}
        </div>
      `
      viewEl.querySelectorAll('.customer-row').forEach(row => {
        row.addEventListener('click', () => openCustomerModal(row.dataset.id))
      })
    }

    function renderAvailability() {
      // Group rules by day so a day can have multiple windows
      const rulesByDay = {}
      for (const r of state.availabilityRules) {
        if (!rulesByDay[r.day_of_week]) rulesByDay[r.day_of_week] = []
        rulesByDay[r.day_of_week].push(r)
      }
      const today = new Date().toISOString().slice(0,10)
      const futureOverrides = state.availabilityOverrides
        .filter(o => o.date >= today)
        .sort((a,b) => a.date.localeCompare(b.date))

      viewEl.innerHTML = `
        <div class="view max-w-3xl">
          <h1 class="display text-3xl mb-2">Weekly availability</h1>
          <p class="text-[var(--text-muted)] mb-6">Your recurring weekly schedule. Add a window for each day you work.</p>
          <button id="add-rule-btn" class="btn-primary px-4 py-2 rounded-lg text-sm mb-4">+ Add availability window</button>
          <div class="space-y-2 mb-10">
            ${[1,2,3,4,5,6,0].map(dow => {
              const rules = rulesByDay[dow] || []
              return `<div class="card rounded-xl p-4">
                <div class="flex items-center gap-4 mb-${rules.length > 0 ? '3' : '0'}">
                  <div class="font-semibold w-24">${dayNames[dow]}</div>

    // Compute available slot start-times for a given date + service
    function adminGenerateSlots(date, service) {
      const dow = date.getDay()
      const rules = state.availabilityRules.filter(r =>
        r.day_of_week === dow && (!r.service_id || r.service_id === service.id)
      )
      if (rules.length === 0) return []
      const slots = []
      const now = new Date()
      const slotDurMs = service.duration_minutes * 60 * 1000
      const slotStepMs = (service.slot_interval_minutes || service.duration_minutes) * 60 * 1000
      const capacity = service.concurrent_capacity || 1
      for (const rule of rules) {
        const [sH, sM] = rule.start_time.split(':').map(Number)
        const [eH, eM] = rule.end_time.split(':').map(Number)
        let cur = new Date(date); cur.setHours(sH, sM, 0, 0)
        const endT = new Date(date); endT.setHours(eH, eM, 0, 0)
        while (cur < endT) {
          const slotEnd = new Date(cur.getTime() + slotDurMs)
          if (slotEnd > endT) break
          if (cur < now) { cur = new Date(cur.getTime() + slotStepMs); continue }
          const overlapping = state.bookings.filter(b => {
            if (b.status === 'cancelled') return false
            const bs = new Date(b.starts_at), be = new Date(b.ends_at)
            return cur < be && slotEnd > bs
          }).length
          slots.push({ start: new Date(cur), end: slotEnd, available: overlapping < capacity })
          cur = new Date(cur.getTime() + slotStepMs)
        }
      }
      slots.sort((a, b) => a.start - b.start)
      return slots
    }

    function adminGetAvailableDates(service, days = 60) {
      const dates = []
      const start = new Date(); start.setHours(0,0,0,0)
      for (let i = 0; i < days; i++) {
        const d = new Date(start); d.setDate(d.getDate() + i)
        const slots = adminGenerateSlots(d, service).filter(s => s.available)
        if (slots.length > 0) dates.push({ date: d, slots })
      }
      return dates
    }

          <div>
            <div class="text-xs font-semibold text-[var(--text-muted)] uppercase tracking-widest mb-2">Private patient notes</div>
            <textarea id="cust-notes" rows="3" class="input w-full px-4 py-3 rounded-lg mb-3" placeholder="General notes about this patient...">${c.notes || ''}</textarea>
            <button id="save-cust-notes" class="btn-primary px-4 py-2 rounded-lg text-sm font-semibold">Save notes</button>
          </div>
        </div>
      `
      modalEl.classList.remove('hidden')
      document.getElementById('close-modal').addEventListener('click', closeModal)
      document.getElementById('save-cust-notes').addEventListener('click', async () => {
        const notes = document.getElementById('cust-notes').value
        await sb.from('customers').update({ notes }).eq('id', c.id)
        c.notes = notes; closeModal(); render()
      })
    }

    sb.channel('admin-bookings')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'bookings' }, async () => {
        await loadAll()
        if (modalEl.classList.contains('hidden')) render()
      })
      .subscribe()

    async function initMain() {
      viewEl.innerHTML = `<div class="space-y-3"><div class="skeleton h-12 w-1/3"></div><div class="skeleton h-20 w-full"></div><div class="skeleton h-16 w-full"></div></div>`
      try {
        await loadAll()
        render()
      } catch (err) {
        viewEl.innerHTML = `<div class="text-red-600">Error loading data: ${err.message}</div>`
      }
    }

    // Initial render
    showAuthEmailForm()
    // Check for existing session
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        if (session.user.email === ADMIN_EMAIL) {
          authScreen.classList.add('hidden')
          mainEl.classList.remove('hidden')
          initMain()
        } else {
          showAccessDenied(session.user.email)
        }
      }
    })
  </script>
</body>
</html>
